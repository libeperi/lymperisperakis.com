<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lymperis Perakis">
  <!-- warm rounded card -->
  <rect width="64" height="64" rx="12" fill="#fbf8f2"/>

  <!-- L upright in ink + P italic accent, side-by-side, shared baseline.
       Fills are set directly (no <style> block) so browsers that disable
       CSS inside SVG favicons still render the letters. -->
  <text x="1" y="49" font-family="Georgia, 'Times New Roman', serif"
        font-weight="500" font-size="44" fill="#1b1410">L</text>
  <text x="30" y="49" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="700" font-size="43" fill="#b4541a">P</text>
</svg>
